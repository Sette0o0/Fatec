spring.application.name=caderneta

# Mostra logs detalhados do Spring Security
logging.level.org.springframework.security=DEBUG

# Configura logs
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.fatec.autenticador=INFO
spring.main.banner-mode=off
spring.main.log-startup-info=false
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=WARN

# URL de conexão com o banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/autenticacaodb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rafa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostra os comandos SQL no console
spring.jpa.show-sql=false

# Formata os comandos SQL para melhor visualização
spring.jpa.properties.hibernate.format_sql=true

# Cria o banco/tabelas automaticamente conforme suas entidades
spring.jpa.hibernate.ddl-auto=create-drop
